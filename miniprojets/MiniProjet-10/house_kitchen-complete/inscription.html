  <section id="premiere-section">
    <div id="premiere-section-texte">

      <h2 class="section-titre">Profil:</h2>
      <p class="section-description"></p>
      <blockquote id="premiere-section-quote">
        <form action="">
          <fieldset>
            <legend>Profil:</legend>
            <label for="fgenre">Vous êtes:</label><br>
            <input type="radio" id="homme" name="genre" value="Mr">Mr
            <input type="radio" id="femme" name="genre" value="Mme">Mme <br>
            <label for="fname">Nom:</label><br>
            <input type="text" id="fname" name="fname" required placeholder="Entrez votre nom"><br>
            <label for="lname">Prénom:</label><br>
            <input type="text" id="lname" name="lname" required><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br>
            <label for="adr">Adresse:</label><br>
            <input type="text" id="adr" name="adr"><br><br>
          </fieldset>
          <button class="bouton-blanc" id="binscription">S'inscrire</button>
        </form>
      </blockquote>

    </div>
    <div id="premiere-section-image">
      <p id="affiche">Merci Pour Votre fidélité </p>
    </div>
  </section> <!-- deuxième-section : fin-->
